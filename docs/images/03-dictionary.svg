  <text x="24" y="58" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">1. 秋 あき</text><text x="24" y="77" fill="#9ec9ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   频率 [Anime &amp; J-drama 2632] [BCCWJ 981] [CC100 [あき] 1371] [Jiten (Anime) [あき] 3845] [Jiten (Anime) [あき] 9821㋕</text><text x="24" y="96" fill="#7ee6c4" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   音高 [NHK日本語発音アクセント新辞典 [あき] あき【秋】</text><text x="24" y="115" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve"> ・［1］ア＼キ</text><text x="24" y="134" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve"></text><text x="24" y="153" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">秋を</text><text x="24" y="172" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve"> ・［1］ア＼キオ] [アクセント辞典 [あき] 1]</text><text x="24" y="191" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   操作  a 秋 制卡    /秋 递归查词</text><text x="24" y="210" fill="#79d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   ▼ Pixiv Light [2026-03-24]</text><text x="24" y="229" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">      ・ ←季節四季のひとつであり、夏の後・冬の前に位置する。社会通念・気象学においては9月から11月の期間が秋である。 pixivで読む</text><text x="24" y="248" fill="#79d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   ▼ 旺文社漢字典 第四版</text><text x="24" y="267" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">      ・ 4【秋】（9）常教29093D2979CB禾シュウ（シウ）漢 qiū異体【秌】本字2-8281─79CC異体【龝】古字675263549F9D異体【穐】俗字1612302C7A50常用音訓シュウ あき筆順</text><text x="24" y="286" fill="#79d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   ▼ 三省堂国語辞典　第八版</text><text x="24" y="305" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">      ・ ＊あき［秋］｟名｠四季の第三。夏の次で冬の前。すずしくてしのぎやすい季節。だいたい九・十・十一月〔旧暦(きゅうれき)では七・八・九月〕の三か月。〔こよみの上では、立秋から立冬の前日まで〕「読書の━」（↔春</text><text x="24" y="324" fill="#79d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   ▼ 大辞林　第四版</text><text x="24" y="343" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">      ・ あき[1]【秋】①四季の一。夏と冬の間の季節。太陽暦では九月から一一月まで。陰暦では七月から九月まで。また、二十四節気では立秋から立冬まで。天文学上では秋分から冬至まで。昼が短く、夜が長くなる。五穀や果実</text><text x="24" y="362" fill="#79d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   ▼ 新明解国語辞典　第八版</text><text x="24" y="381" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">      ・ ＊＊あき①【秋】〔温帯で〕暑い夏が終わり寒い冬になるまでの間の、さわやかな気候の季節。木の実が生(ナ)り、台風が来る、九・十・十一の三か月。「忍びよる━の気配」「━が深まる」「━たけなわ」</text><text x="24" y="400" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve"></text><text x="24" y="419" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">2. 秋 しう</text><text x="24" y="438" fill="#9ec9ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   频率 [Anime &amp; J-drama 2632] [BCCWJ 981]</text><text x="24" y="457" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   操作  a 秋 制卡    /秋 递归查词</text><text x="24" y="476" fill="#79d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   ▼ 旺文社漢字典 第四版</text><text x="24" y="495" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">      ・ 4【秋】（9）常教29093D2979CB禾シュウ（シウ）漢 qiū異体【秌】本字2-8281─79CC異体【龝】古字675263549F9D異体【穐】俗字1612302C7A50常用音訓シュウ あき筆順</text><text x="24" y="514" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve"></text><text x="24" y="533" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">3. 秋 とき</text><text x="24" y="552" fill="#9ec9ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   频率 [Anime &amp; J-drama 2632] [BCCWJ 981] [Jiten (Anime) [とき] 362㋕] [Jiten (Anime) [とき] 31853]</text><text x="24" y="571" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   操作  a 秋 制卡    /秋 递归查词</text><text x="24" y="590" fill="#79d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   ▼ 旺文社漢字典 第四版</text><text x="24" y="609" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">      ・ 4【秋】（9）常教29093D2979CB禾シュウ（シウ）漢 qiū異体【秌】本字2-8281─79CC異体【龝】古字675263549F9D異体【穐】俗字1612302C7A50常用音訓シュウ あき筆順</text><text x="24" y="628" fill="#79d7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">   ▼ 三省堂国語辞典　第八版</text><text x="24" y="647" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">      ・ ←＊＊とき｟名｠［時］①過去から現在、未来へと少しも止まることなく進み、決してもどることのないもの。変化を通して、また時計などを使って知ることができる。「もしも━を止められたら・━が経(た)つ」「：時間」</text><text x="24" y="666" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">...</text>
