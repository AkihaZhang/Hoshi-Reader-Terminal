space" font-size="15" xml:space="preserve">かがみの孤城</text><text x="24" y="324" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">こじょう【孤城】</text><text x="24" y="343" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">①ただ一つだけぽつんと立っている城。</text><text x="24" y="362" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">②敵軍に囲まれ、援軍の来るあてもない城。</text><text x="24" y="381" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">────────────────────────</text><text x="24" y="400" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">←/→ 翻页    ↑/↓ Sasayaki 上/下一句    Enter/Space 播放/暂停    r 排版    y 详情    q 退出</text><text x="24" y="419" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">输入 /読みました 查词    输入 a 読む 制卡    输入 h 备注内容 划线</text>
