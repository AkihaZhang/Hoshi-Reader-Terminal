<svg xmlns="http://www.w3.org/2000/svg" width="720" height="350" viewBox="0 0 720 350" role="img" aria-label="Hoshi Reader Terminal screenshot">
  <rect width="720" height="350" rx="8" fill="#111820"/>
  <rect x="0" y="0" width="720" height="34" rx="8" fill="#202a33"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="17" r="6" fill="#28c840"/>
  <text x="86" y="22" fill="#9fb4c0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="13">hoshi</text>
  <rect x="16" y="44" width="672" height="290" rx="6" fill="#0b1016" stroke="#263542"/>
  <text x="24" y="58" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">demo book  第 1/1 页</text><text x="24" y="77" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">────────────────────────</text><text x="24" y="96" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">星読み端末版 第一章</text><text x="24" y="115" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve"></text><text x="24" y="134" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">端末で本を読むと、ページをめくる音はしない。</text><text x="24" y="153" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">そのかわり、Enter キーで次のページへ進む。</text><text x="24" y="172" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve"></text><text x="24" y="191" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">主人公は言った。「今日は 読みました と言えるくらい読むぞ」</text><text x="24" y="210" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">辞書には「読む」という見出しが登録されていた。</text><text x="24" y="229" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve"></text><text x="24" y="248" fill="#7ee6c4" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">Hoshi Reader Terminal は簡易的な縦書き表示にも切り替えられる。</text><text x="24" y="267" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">────────────────────────</text><text x="24" y="286" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">Enter/n 下一页    p 上一页    v 纵书    s 统计    q 退出</text><text x="24" y="305" fill="#e8eef2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" xml:space="preserve">查词：/読みました    制卡：a 読む    划线备注：h 备注内容</text>
</svg>
